<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess Game</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #121212;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: #1e1e1e;
        padding: 25px;
        border-radius: 15px;
        text-align: center;
        width: 300px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
        margin-bottom: 10px;
    }

    input {
        width: 80%;
        padding: 10px;
        font-size: 18px;
        text-align: center;
        border-radius: 8px;
        border: none;
        margin: 10px 0;
    }

    button {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background: #4cc9f0;
        font-weight: bold;
        cursor: pointer;
    }

    .result {
        margin-top: 15px;
        min-height: 20px;
    }

    .attempts {
        color: #aaa;
        margin-top: 10px;
    }

    .restart {
        margin-top: 15px;
        background: #444;
        color: white;
    }
</style>
</head>

<body>

<div class="card">
    <h1>🎯 Guess</h1>
    <p>1 - 100</p>

    <input id="input" type="number" placeholder="Enter number" />
    <br>
    <button onclick="guess()">GUESS</button>

    <div class="result" id="result"></div>
    <div class="attempts" id="attempts"></div>

    <button class="restart" onclick="reset()">Restart</button>
</div>

<script>
    let number = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;
    let maxAttempts = 7;

    function guess() {
        const input = document.getElementById("input");
        const result = document.getElementById("result");
        const attemptsText = document.getElementById("attempts");

        let value = parseInt(input.value);

        if (isNaN(value)) {
            result.innerText = "⚠ Enter a number!";
            result.style.color = "#ff4d4d";
            return;
        }

        attempts++;
        let left = maxAttempts - attempts;

        if (value === number) {
            result.innerText = "🎉 Correct! " + number;
            result.style.color = "#4caf50";
        } else if (value < number) {
            result.innerText = "📉 Too low";
            result.style.color = "#4cc9f0";
        } else {
            result.innerText = "📈 Too high";
            result.style.color = "#4cc9f0";
        }

        attemptsText.innerText = "Attempts left: " + left;

        if (left <= 0 && value !== number) {
            result.innerText = "💀 Game Over! " + number;
            result.style.color = "#ff4d4d";
        }

        input.value = "";
    }

    function reset() {
        number = Math.floor(Math.random() * 100) + 1;
        attempts = 0;
        document.getElementById("result").innerText = "";
        document.getElementById("attempts").innerText = "";
    }
</script>

</body>
</html>
